name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Database strategy: Supabase Cloud (no Docker dependency).
# Migrations are applied via `supabase db push` manually or in a separate
# deploy workflow. RLS tests run locally: `pnpm test:rls`.

jobs:
  lint-typecheck-build:
    name: Lint / Typecheck / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -C apps/web typecheck

      - name: Lint
        run: pnpm -C apps/web lint

      - name: Build
        run: pnpm -C apps/web build
