# Supabase project configuration.
# Used by the CLI for migration tracking and deployment.
# Database: Supabase Cloud — no local Docker stack.
# Link: supabase link --project-ref <ref>
# Deploy migrations: supabase db push

project_id = "mindmosaic"

[api]
enabled = true
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
major_version = 17

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]

[auth.email]
# Disable email confirmation for development — enable before production launch
enable_confirmations = false

# JWT custom access token hook — injects tenant_id and role into app_metadata.
# Register the function in the Supabase Dashboard:
#   Authentication → Hooks → Custom Access Token → choose custom_access_token_hook
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"
